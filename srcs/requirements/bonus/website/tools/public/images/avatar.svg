<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1620"/>
    </linearGradient>
    <clipPath id="hexClip">
      <polygon points="200,60 330,130 330,270 200,340 70,270 70,130"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="url(#glowGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Outer hex ring -->
  <polygon points="200,45 345,122 345,278 200,355 55,278 55,122"
    fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Inner hex fill -->
  <polygon points="200,60 330,130 330,270 200,340 70,270 70,130"
    fill="url(#avatarGrad)" stroke="url(#hexGrad)" stroke-width="2"/>

  <!-- Glow behind avatar -->
  <ellipse cx="200" cy="195" rx="90" ry="100" fill="#00d4ff" opacity="0.04"/>

  <!-- Stylized person silhouette -->
  <!-- Head -->
  <circle cx="200" cy="150" r="45" fill="#1e3a4a" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <circle cx="200" cy="150" r="42" fill="#162838"/>
  <!-- Face highlight -->
  <ellipse cx="193" cy="145" rx="22" ry="26" fill="#1d3344" opacity="0.6"/>

  <!-- MB initials -->
  <text x="200" y="160" font-family="'Courier New', monospace" font-size="30" font-weight="700"
    fill="url(#hexGrad)" text-anchor="middle" filter="url(#glow)">MB</text>

  <!-- Shoulders / body -->
  <path d="M 130 300 Q 130 240 200 230 Q 270 240 270 300 L 330 300 L 330 270 L 200 340 L 70 270 L 70 300 Z"
    fill="#0e1e2c" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>

  <!-- Collar -->
  <path d="M 175 225 L 200 240 L 225 225" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner decorations -->
  <g fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5" filter="url(#glow)">
    <polyline points="20,20 20,40 40,40"/>
    <polyline points="380,20 380,40 360,40"/>
    <polyline points="20,380 20,360 40,360"/>
    <polyline points="380,380 380,360 360,360"/>
  </g>

  <!-- Dots -->
  <circle cx="200" cy="22" r="3" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="200" cy="378" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="22" cy="200" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="378" cy="200" r="3" fill="#00d4ff" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="200" y="375" font-family="'Courier New', monospace" font-size="9"
    fill="#00d4ff" text-anchor="middle" opacity="0.5" letter-spacing="3">SOFTWARE ENGINEER</text>
</svg>
