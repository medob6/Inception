<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0a0a1f"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#060d06"/>
    </linearGradient>
    <linearGradient id="wallL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003344"/>
      <stop offset="100%" stop-color="#004455"/>
    </linearGradient>
    <linearGradient id="wallR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001a22"/>
      <stop offset="100%" stop-color="#002233"/>
    </linearGradient>
    <filter id="glow3d">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="viewClip">
      <rect x="0" y="0" width="600" height="340"/>
    </clipPath>
  </defs>

  <rect width="600" height="340" fill="url(#bg1)" rx="8"/>

  <!-- Window chrome -->
  <rect width="600" height="28" fill="#111118" rx="8"/>
  <rect y="8" width="600" height="20" fill="#111118"/>
  <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="14" r="5" fill="#ffbd2e"/>
  <circle cx="50" cy="14" r="5" fill="#28ca41"/>
  <text x="300" y="19" font-family="'Courier New', monospace" font-size="10"
    fill="#4a5568" text-anchor="middle">cub3D — raycasting engine [C]</text>

  <!-- 3D scene -->
  <g clip-path="url(#viewClip)" transform="translate(0,28)">
    <!-- Sky -->
    <rect x="0" y="0" width="600" height="156" fill="url(#skyGrad)"/>
    <!-- Floor -->
    <rect x="0" y="156" width="600" height="156" fill="url(#floorGrad)"/>
    <!-- Horizon line -->
    <line x1="0" y1="156" x2="600" y2="156" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>

    <!-- Raycasting wall slices - simulated 3D corridor -->
    <!-- Far center wall -->
    <rect x="255" y="106" width="90" height="100" fill="#005577" opacity="0.9"/>
    <rect x="258" y="109" width="84" height="94" fill="#004466" opacity="0.8"/>
    <!-- Wall texture lines -->
    <g stroke="#00aacc" stroke-width="0.3" opacity="0.4">
      <line x1="275" y1="106" x2="275" y2="206"/>
      <line x1="292" y1="106" x2="292" y2="206"/>
      <line x1="309" y1="106" x2="309" y2="206"/>
      <line x1="326" y1="106" x2="326" y2="206"/>
    </g>

    <!-- Left wall slices -->
    <rect x="195" y="86" width="60" height="140" fill="url(#wallL)" opacity="0.95"/>
    <rect x="145" y="60" width="50" height="192" fill="url(#wallL)" opacity="0.85"/>
    <rect x="100" y="36" width="45" height="240" fill="url(#wallL)" opacity="0.75"/>
    <rect x="55" y="10" width="45" height="292" fill="url(#wallL)" opacity="0.65"/>
    <rect x="10" y="-10" width="45" height="332" fill="url(#wallL)" opacity="0.5"/>

    <!-- Right wall slices -->
    <rect x="345" y="86" width="60" height="140" fill="url(#wallR)" opacity="0.95"/>
    <rect x="405" y="60" width="50" height="192" fill="url(#wallR)" opacity="0.85"/>
    <rect x="455" y="36" width="45" height="240" fill="url(#wallR)" opacity="0.75"/>
    <rect x="500" y="10" width="45" height="292" fill="url(#wallR)" opacity="0.65"/>
    <rect x="545" y="-10" width="55" height="332" fill="url(#wallR)" opacity="0.5"/>

    <!-- Door in center -->
    <rect x="270" y="150" width="60" height="56" fill="#002233" stroke="#00aacc" stroke-width="0.8"/>
    <rect x="275" y="155" width="22" height="51" fill="#001a29"/>
    <rect x="303" y="155" width="22" height="51" fill="#001a29"/>
    <circle cx="300" cy="178" r="3" fill="#00d4ff" opacity="0.8"/>

    <!-- Minimap overlay (top right) -->
    <rect x="490" y="10" width="100" height="100" fill="#000" opacity="0.8" rx="4" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- Map grid -->
    <g stroke="#003344" stroke-width="0.5" opacity="0.8">
      <line x1="510" y1="10" x2="510" y2="110"/>
      <line x1="530" y1="10" x2="530" y2="110"/>
      <line x1="550" y1="10" x2="550" y2="110"/>
      <line x1="570" y1="10" x2="570" y2="110"/>
      <line x1="490" y1="30" x2="590" y2="30"/>
      <line x1="490" y1="50" x2="590" y2="50"/>
      <line x1="490" y1="70" x2="590" y2="70"/>
      <line x1="490" y1="90" x2="590" y2="90"/>
    </g>
    <!-- Map walls -->
    <rect x="490" y="10" width="20" height="20" fill="#004466"/>
    <rect x="510" y="10" width="20" height="20" fill="#004466"/>
    <rect x="490" y="30" width="20" height="20" fill="#004466"/>
    <rect x="570" y="10" width="20" height="80" fill="#004466"/>
    <rect x="490" y="90" width="80" height="20" fill="#004466"/>
    <!-- Player dot + rays -->
    <circle cx="540" cy="60" r="3" fill="#00d4ff" filter="url(#glow3d)"/>
    <g stroke="#00d4ff" stroke-width="0.4" opacity="0.5">
      <line x1="540" y1="60" x2="555" y2="45"/>
      <line x1="540" y1="60" x2="558" y2="52"/>
      <line x1="540" y1="60" x2="558" y2="60"/>
      <line x1="540" y1="60" x2="555" y2="68"/>
    </g>

    <!-- Scan line effect -->
    <rect x="0" y="155" width="600" height="2" fill="url(#scanline)" opacity="0.8"/>

    <!-- Crosshair -->
    <g stroke="#00d4ff" stroke-width="1" opacity="0.7" filter="url(#glow3d)">
      <line x1="290" y1="150" x2="310" y2="150"/>
      <line x1="300" y1="140" x2="300" y2="160"/>
      <circle cx="300" cy="150" r="6" fill="none" opacity="0.5"/>
    </g>
  </g>

  <!-- Bottom HUD -->
  <rect x="0" y="310" width="600" height="30" fill="#0a0a14"/>
  <text x="15" y="329" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.8">
    C · MiniLibX · DDA Raycasting · 42/1337 School
  </text>
  <text x="585" y="329" font-family="'Courier New', monospace" font-size="9" fill="#00ff88" opacity="0.8" text-anchor="end">★ 2</text>
</svg>
