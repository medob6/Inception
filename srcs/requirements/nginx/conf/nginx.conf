events {}

http {
    include mime.types;
    server {
        listen 443 ssl;
        server_name mbousset.42.fr;

        ssl_certificate /etc/ssl/certs/nginx.crt;
        ssl_certificate_key /etc/ssl/private/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /var/www/html;
        index index.php;

        # cAdvisor - redirect to containers endpoint
        location ^~ /cadvisor/ {
            return 302 http://localhost:8080/containers/;
        }

        # Adminer
        location /adminer {
            proxy_pass http://adminer:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # Static Bonus Website
        location ^~ /website {
            rewrite ^/website$ /website/ last;
            proxy_pass http://website:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /website;
            proxy_redirect http://website:3000/ /website/;
        }
    }
}
