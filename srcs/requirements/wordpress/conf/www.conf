[www]

; the user and group that php-fpm runs as
user = nobody
group = nobody

; listen on port 9000 — this is what nginx connects to
listen = 0.0.0.0:9000

; allow nginx container to connect
listen.allowed_clients = 0.0.0.0

; process manager settings
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3